name: Build PKinetix Windows EXE

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build PKinetix executable
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name PKinetix main.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: PKinetix-Windows
          path: dist/PKinetix.exe
          if-no-files-found: error
          retention-days: 30